<script>
  (function () {
    var MOON =
      '<svg class="theme-toggle-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    var SUN =
      '<svg class="theme-toggle-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4.2"/><line x1="12" y1="1.5" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22.5"/><line x1="3.5" y1="3.5" x2="5.3" y2="5.3"/><line x1="18.7" y1="18.7" x2="20.5" y2="20.5"/><line x1="1.5" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22.5" y2="12"/><line x1="3.5" y1="20.5" x2="5.3" y2="18.7"/><line x1="18.7" y1="5.3" x2="20.5" y2="3.5"/></svg>';

    var FONT_MIN = 13;
    var FONT_MAX = 28;
    var FONT_STEP = 1.6;
    var FONT_BASE = 17;
    var fontSize = FONT_BASE;

    function initClassicLayout() {
      if (document.getElementById("page")) return;

      var root = document.documentElement;
      document.body.classList.add("masthead-fixed", "grid");

      var container = document.querySelector(".container-fluid");
      var header = document.querySelector("header.sidebar-book");
      var main = document.querySelector("main#content");
      var chapterSidebar = document.querySelector(".sidebar-chapter");
      var oldFooter = document.querySelector("footer.bg-primary, footer");

      if (!container || !header || !main) return;

      var titleLink = header.querySelector("h1 a");
      var bookTitle = titleLink ? titleLink.textContent.trim() : "Mathematics for Physics";
      var tagline = "";

      var page = document.createElement("div");
      page.id = "page";
      page.className = "hfeed site";

      var masthead = document.createElement("header");
      masthead.id = "masthead";
      masthead.className = "site-header";
      masthead.setAttribute("role", "banner");

      var headerMain = document.createElement("div");
      headerMain.className = "header-main";

      var bookButton = document.createElement("a");
      bookButton.href = "index.html";
      bookButton.className = "book-button";
      bookButton.innerHTML = "<button type=\"button\">Book</button>";

      var siteTitle = document.createElement("h1");
      siteTitle.className = "site-title";
      siteTitle.innerHTML =
        '<a href="index.html" rel="home">' +
        bookTitle +
        '<span class="site-tagline">' +
        tagline +
        "</span></a>";

      var primaryNav = document.createElement("nav");
      primaryNav.id = "primary-navigation";
      primaryNav.className = "site-navigation primary-navigation";
      primaryNav.setAttribute("role", "navigation");

      var menuToggle = document.createElement("button");
      menuToggle.className = "menu-toggle";
      menuToggle.type = "button";
      menuToggle.textContent = "Primary Menu";

      var skipLink = document.createElement("a");
      skipLink.className = "screen-reader-text skip-link";
      skipLink.href = "#content";
      skipLink.textContent = "Skip to content";

      var primaryMenu = document.createElement("div");
      primaryMenu.id = "primary-menu";
      primaryMenu.className = "nav-menu";

      var primaryList = document.createElement("ul");
      header.querySelectorAll(".book-toc > .book-toc-topic").forEach(function (topic) {
        var link = topic.querySelector(".book-toc-topic-header > a");
        if (!link) return;

        var li = document.createElement("li");
        li.className = "page_item";
        li.appendChild(link.cloneNode(true));

        var section = topic.querySelector(".book-toc-section");
        if (section && section.children.length) {
          li.classList.add("page_item_has_children");
          var childUl = document.createElement("ul");
          childUl.className = "children";
          section.querySelectorAll("li > a").forEach(function (subLink) {
            var childLi = document.createElement("li");
            childLi.className = "page_item";
            childLi.appendChild(subLink.cloneNode(true));
            childUl.appendChild(childLi);
          });
          li.appendChild(childUl);
        }
        primaryList.appendChild(li);
      });
      primaryMenu.appendChild(primaryList);

      primaryNav.appendChild(menuToggle);
      primaryNav.appendChild(skipLink);
      primaryNav.appendChild(primaryMenu);

      menuToggle.addEventListener("click", function () {
        primaryNav.classList.toggle("toggled-on");
        menuToggle.setAttribute(
          "aria-expanded",
          primaryNav.classList.contains("toggled-on") ? "true" : "false"
        );
      });

      headerMain.appendChild(bookButton);
      headerMain.appendChild(siteTitle);
      headerMain.appendChild(primaryNav);
      masthead.appendChild(headerMain);

      var siteMain = document.createElement("div");
      siteMain.id = "main";
      siteMain.className = "site-main";

      var mainContent = document.createElement("div");
      mainContent.id = "main-content";
      mainContent.className = "main-content";

      var contentArea = document.createElement("div");
      contentArea.id = "primary";
      contentArea.className = "content-area";

      var siteContent = document.createElement("div");
      siteContent.id = "content";
      siteContent.className = "site-content";
      siteContent.setAttribute("role", "main");

      var article = document.createElement("article");
      article.className = "hentry page type-page status-publish";

      var entryHeader = document.createElement("header");
      entryHeader.className = "entry-header";

      var breadcrumbData = document.getElementById("page-breadcrumbs");
      if (breadcrumbData) {
        try {
          var trail = JSON.parse(breadcrumbData.textContent || "[]");
          if (Array.isArray(trail) && trail.length) {
            var breadcrumbs = document.createElement("nav");
            breadcrumbs.className = "breadcrumbs";
            breadcrumbs.setAttribute("aria-label", "Breadcrumb");
            trail.forEach(function (item, index) {
              if (index > 0) {
                var sep = document.createElement("span");
                sep.className = "breadcrumb-sep";
                sep.textContent = " > ";
                breadcrumbs.appendChild(sep);
              }
              var crumb = document.createElement("a");
              crumb.href = item.href;
              crumb.textContent = item.title;
              breadcrumbs.appendChild(crumb);
            });
            var trailing = document.createElement("span");
            trailing.className = "breadcrumb-sep";
            trailing.textContent = " >";
            breadcrumbs.appendChild(trailing);
            entryHeader.appendChild(breadcrumbs);
          }
        } catch (e) {}
      }

      var pageHeading = main.querySelector("h1");
      if (pageHeading) {
        var entryTitle = document.createElement("h1");
        entryTitle.className = "entry-title";
        var headingClone = pageHeading.cloneNode(true);
        headingClone.querySelectorAll(".header-section-number, .anchor").forEach(function (n) {
          n.remove();
        });
        entryTitle.textContent = headingClone.textContent.trim();
        entryHeader.appendChild(entryTitle);
      }

      var entryContent = document.createElement("div");
      entryContent.className = "entry-content";

      Array.from(main.childNodes).forEach(function (node) {
        if (node.nodeType !== 1) return;
        if (node.matches("script")) return;
        if (node.classList.contains("chapter-nav")) return;
        if (node.matches("h1")) return;
        entryContent.appendChild(node);
      });

      entryContent.querySelectorAll("h1").forEach(function (h) {
        h.remove();
      });

      var chapterNav = main.querySelector(".chapter-nav");
      if (chapterNav) {
        chapterNav.remove();
      }

      article.appendChild(entryHeader);
      article.appendChild(entryContent);
      siteContent.appendChild(article);
      contentArea.appendChild(siteContent);

      var contentSidebar = document.createElement("div");
      contentSidebar.id = "content-sidebar";
      contentSidebar.className = "content-sidebar widget-area";
      contentSidebar.setAttribute("role", "complementary");

      var searchWidget = document.createElement("aside");
      searchWidget.id = "search-6";
      searchWidget.className = "widget widget_search";

      var existingForm = header.querySelector('form[role="search"]');
      if (existingForm) {
        existingForm.classList.add("search-form");
        var searchInput = existingForm.querySelector("#search");
        if (searchInput) {
          searchInput.classList.remove("form-control");
          searchInput.classList.add("search-field");
          searchInput.placeholder = "Search \u2026";
          if (!existingForm.querySelector("label")) {
            var searchLabel = document.createElement("label");
            searchLabel.innerHTML =
              '<span class="screen-reader-text">Search for:</span>';
            searchLabel.appendChild(searchInput);
            existingForm.insertBefore(searchLabel, existingForm.firstChild);
          }
        }
        if (!existingForm.querySelector(".search-submit")) {
          var submit = document.createElement("input");
          submit.type = "submit";
          submit.className = "search-submit";
          submit.value = "Search";
          existingForm.appendChild(submit);
        }
        searchWidget.appendChild(existingForm);
      } else {
        var searchForm = document.createElement("form");
        searchForm.setAttribute("role", "search");
        searchForm.className = "search-form";
        searchForm.innerHTML =
          '<label><span class="screen-reader-text">Search for:</span>' +
          '<input type="search" class="search-field" id="search" placeholder="Search &hellip;" aria-label="Search"></label>' +
          '<input type="submit" class="search-submit" value="Search">';
        searchWidget.appendChild(searchForm);
      }

      var locationWidget = document.createElement("aside");
      locationWidget.id = "flexipages-4";
      locationWidget.className = "widget widget_pages widget_flexipages flexipages_widget";

      var locationTitle = document.createElement("h1");
      locationTitle.className = "widget-title";
      locationTitle.textContent = "Location";

      var locationNav = header.querySelector('nav[aria-label="Table of contents"]');
      if (locationNav) {
        var locationList = locationNav.querySelector(".book-toc");
        if (locationList) {
          locationList.classList.add("location-list");
          locationList.querySelectorAll(".book-toc-toggle").forEach(function (toggle) {
            toggle.remove();
          });
          locationList.querySelectorAll(".book-toc-section").forEach(function (section) {
            section.classList.add("children");
          });
          locationList.querySelectorAll(".book-toc-topic").forEach(function (topic) {
            topic.classList.add("page_item");
            if (topic.querySelector(".book-toc-section")) {
              topic.classList.add("page_item_has_children");
            }
            var header = topic.querySelector(".book-toc-topic-header");
            var link = topic.querySelector(".book-toc-topic-header > a");
            if (header && link) {
              topic.insertBefore(link, topic.firstChild);
              header.remove();
            }
            if (topic.querySelector(".active, .active-parent")) {
              topic.classList.add("current_page_item");
            }
          });
        }
        locationWidget.appendChild(locationTitle);
        if (locationList) {
          locationWidget.appendChild(locationList);
        }
      }

      var controlsWidget = document.createElement("aside");
      controlsWidget.id = "zeno_fr_widget-3";
      controlsWidget.className = "widget widget_controls Zeno_FR_Widget";

      var controlsRow = document.createElement("div");
      controlsRow.className = "sidebar-controls-row";

      var fontWidget = document.createElement("div");
      fontWidget.className = "zeno_font_resizer_container";
      fontWidget.innerHTML =
        '<p class="zeno_font_resizer">' +
        '<span>' +
        '<a href="#" class="zeno_font_resizer_minus" title="Decrease font size">A<span class="screen-reader-text"> Decrease font size.</span></a> ' +
        '<a href="#" class="zeno_font_resizer_reset" title="Reset font size">A<span class="screen-reader-text"> Reset font size.</span></a> ' +
        '<a href="#" class="zeno_font_resizer_add" title="Increase font size">A<span class="screen-reader-text"> Increase font size.</span></a>' +
        "</span></p>";

      var themeBtn = document.createElement("button");
      themeBtn.id = "theme-toggle";
      themeBtn.className = "theme-toggle";
      themeBtn.type = "button";
      themeBtn.setAttribute("aria-label", "Toggle dark and light mode");

      controlsRow.appendChild(fontWidget);
      controlsRow.appendChild(themeBtn);
      controlsWidget.appendChild(controlsRow);

      contentSidebar.appendChild(searchWidget);
      contentSidebar.appendChild(locationWidget);
      contentSidebar.appendChild(controlsWidget);

      mainContent.appendChild(contentArea);
      mainContent.appendChild(contentSidebar);
      siteMain.appendChild(mainContent);

      var secondary = document.createElement("div");
      secondary.id = "secondary";
      secondary.innerHTML = '<h2 class="site-description"></h2>';

      var siteFooter = document.createElement("footer");
      siteFooter.id = "colophon";
      siteFooter.className = "site-footer";
      siteFooter.setAttribute("role", "contentinfo");
      siteFooter.innerHTML =
        '<div class="site-info"><em>' +
        bookTitle +
        "</em> — built with <a href=\"https://bookdown.org\">bookdown</a></div>";

      page.appendChild(masthead);
      page.appendChild(siteMain);
      page.appendChild(secondary);
      page.appendChild(siteFooter);

      container.parentNode.insertBefore(page, container);
      container.remove();
      if (chapterSidebar) chapterSidebar.remove();
      if (oldFooter) oldFooter.remove();

      function currentTheme() {
        return root.getAttribute("data-theme") === "dark" ? "dark" : "light";
      }

      function renderTheme(theme) {
        themeBtn.innerHTML = theme === "dark" ? SUN : MOON;
        themeBtn.setAttribute(
          "title",
          theme === "dark" ? "Switch to light mode" : "Switch to dark mode"
        );
      }

      function applyFontSize(size) {
        fontSize = Math.max(FONT_MIN, Math.min(FONT_MAX, size));
        root.style.fontSize = fontSize + "px";
        try {
          localStorage.setItem("book-font-size", String(fontSize));
        } catch (e) {}
      }

      try {
        var storedFont = localStorage.getItem("book-font-size");
        if (storedFont !== null) {
          fontSize = parseFloat(storedFont);
        }
      } catch (e) {}
      applyFontSize(fontSize);
      renderTheme(currentTheme());

      themeBtn.addEventListener("click", function () {
        var next = currentTheme() === "dark" ? "light" : "dark";
        root.setAttribute("data-theme", next);
        try {
          localStorage.setItem("book-theme", next);
        } catch (e) {}
        renderTheme(next);
      });

      fontWidget.querySelector(".zeno_font_resizer_minus").addEventListener("click", function (e) {
        e.preventDefault();
        applyFontSize(fontSize - FONT_STEP);
      });
      fontWidget.querySelector(".zeno_font_resizer_reset").addEventListener("click", function (e) {
        e.preventDefault();
        applyFontSize(FONT_BASE);
      });
      fontWidget.querySelector(".zeno_font_resizer_add").addEventListener("click", function (e) {
        e.preventDefault();
        applyFontSize(fontSize + FONT_STEP);
      });

      primaryNav.querySelectorAll(".page_item_has_children").forEach(function (item) {
        item.addEventListener("mouseenter", function () {
          item.classList.add("focus");
        });
        item.addEventListener("mouseleave", function () {
          item.classList.remove("focus");
        });
      });
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", initClassicLayout);
    } else {
      initClassicLayout();
    }
  })();
</script>
